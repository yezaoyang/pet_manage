<head>
  <link rel="stylesheet" href="/static/css/admin-layout.css">
  <link rel="stylesheet" href="/static/css/good-list.css">

</head>

<div class="card-body border-bottom bg-light">
  <form class="form-inline" id="searchForm">
    <div class="row w-100">
      <div class="col-md-3">
        <input type="text" class="form-control w-100" id="search_name" placeholder="搜索商品名称...">
      </div>
      <div class="col-md-4">
        <button type="button" class="btn btn-primary" onclick="loadGoodData(1)">
          <i class="fa fa-search"></i> 查询
        </button>
        <button type="button" class="btn btn-outline-secondary ml-2" onclick="resetSearch()">重置</button>
      </div>
    </div>
  </form>
</div>

<div class="container-fluid mt-3">
  <div class="card shadow mb-4">
    <div class="card-header py-3 d-flex justify-content-between align-items-center">
      <h6 class="m-0 font-weight-bold text-primary"><i class="fa fa-box"></i> 商品库存管理</h6>
      <button class="btn btn-success btn-sm" onclick="showAddModal()">
        <i class="fa fa-plus"></i> 新增商品
      </button>
    </div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-bordered" id="goodTable">
          <thead class="table-light">
          <tr>
            <th width="60">序号</th>
            <th width="80">图片</th>
            <th>商品名称</th>
            <th>所属分类</th>
            <th>单价</th>
            <th>库存</th>
            <th>状态</th>
            <th width="180">操作</th>
          </tr>
          </thead>
          <tbody id="goodList">
          </tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-3">
        <div id="pageInfo" class="text-secondary small">显示第 1 页，共 0 条记录</div>
        <nav>
          <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>
</div>
<div class="modal fade" id="goodModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title" id="modalTitle">新增商品</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="goodForm">
          <input type="hidden" id="good_id">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label">商品名称</label>
              <input type="text" class="form-control" id="good_name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label">所属分类</label>
              <select class="form-control" id="good_category" required>
<!--                <option value="">&#45;&#45; 请选择分类 &#45;&#45;</option>-->
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label">单价 (￥)</label>
              <input type="number" step="0.01" class="form-control" id="good_price" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">库存数量</label>
              <input type="number" class="form-control" id="good_stock" required>
            </div>
            <div class="col-md-4 mb-3">
              <label class="form-label">上架状态</label>
              <select class="form-control" id="good_status">
                <option value="1">已上架</option>
                <option value="0">已下架</option>
              </select>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">图片地址 (URL)</label>
            <input type="text" class="form-control" id="good_image" placeholder="可输入在线图片链接">
          </div>
          <div class="mb-3">
            <label class="form-label">商品描述</label>
            <textarea class="form-control" id="good_description" rows="3"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
        <button type="button" class="btn btn-primary" onclick="saveGood()">保存</button>
      </div>
    </div>
  </div>
</div>
<script src="/static/js/good_list.js"></script>
