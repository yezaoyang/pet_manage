<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" type="text/css" href="../css/admin-layout.css">
</head>
<div class="card border-0 shadow-sm">
    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <h5 class="mb-0 me-3 fw-bold text-dark">
                <i class="fas fa-user-shield me-2 text-primary"></i>管理员管理
            </h5>
            <div id="auth-tips"></div>
        </div>

        <div class="btn-group">
            <button class="btn btn-outline-danger btn-sm px-3 me-2" id="btnBatchDelete" onclick="batchDeleteUsers()" disabled>
                <i class="fas fa-trash-alt me-1"></i> 批量删除
            </button>
            <button class="btn btn-primary btn-sm px-3" id="btnAddUser" onclick="showAddUserModal()">
                <i class="fas fa-plus me-1"></i> 新增管理员
            </button>
        </div>
    </div>

    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-hover align-middle" id="userTable">
                <thead class="table-light">
                <tr>
                    <th width="40">
                        <input type="checkbox" class="form-check-input" id="checkAll" onclick="toggleAll(this)">
                    </th>
                    <th width="80">序号</th>
                    <th>用户名</th>
                    <th>电子邮箱</th>
                    <th>角色身份</th>
                    <th>创建时间</th>
                    <th width="150">操作</th>
                </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="userModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header">
                <h5 class="modal-title" id="userModalLabel">新增管理员</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="userForm">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="username" required placeholder="请输入登录账号">
                    </div>
                    <div class="mb-3" id="passwordGroup">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="password" placeholder="请输入密码">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-control" id="email" placeholder="example@pet.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">角色分配</label>
                        <select class="form-select" id="role">
                            <option value="2">普通管理员 (只读)</option>
                            <option value="1">超级管理员 (全权限)</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveUser()">保存账号</button>
            </div>
        </div>
    </div>
</div>
<script src="/static/js/user_list.js"></script>
