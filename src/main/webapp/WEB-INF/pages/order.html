<head>
    <link rel="stylesheet" href="/static/css/admin-layout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        .status-badge { width: 80px; }
        .table img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
        .order-info-label { font-weight: bold; color: #666; width: 100px; display: inline-block; }
        /* 修复按钮样式偏移 */
        .btn-xs { padding: 1px 5px; font-size: 12px; line-height: 1.5; border-radius: 3px; }
    </style>
</head>

<div class="card-body border-bottom bg-light">
    <form class="form-inline" id="searchForm">
        <div class="row align-items-center">
            <div class="col-auto">
                <input type="text" class="form-control" id="search_order_no" placeholder="输入订单编号">
            </div>
            <div class="col-auto">
                <input type="number" class="form-control" id="search_customer_id" placeholder="输入顾客ID">
            </div>
            <div class="col-auto">
                <button type="button" class="btn btn-primary" onclick="loadOrderData(1)">
                    <i class="fa fa-search"></i> 筛选
                </button>
                <button type="button" class="btn btn-outline-secondary ml-2" onclick="resetOrderSearch()">重置</button>
            </div>
        </div>
    </form>
</div>

<div class="container-fluid mt-3">
    <div class="card shadow mb-4">
        <div class="card-header py-3">
            <h6 class="m-0 font-weight-bold text-primary"><i class="fa fa-shopping-cart"></i> 订单管理</h6>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover table-bordered" id="orderTable" width="100%">
                    <thead class="table-light">
                    <tr>
                        <th>ID</th>
                        <th>订单编号</th>
                        <th>顾客ID</th>
                        <th>收货地址</th>
                        <th>总金额</th>
                        <th>下单时间</th>
                        <th>操作</th>
                    </tr>
                    </thead>
                    <tbody id="orderList">
                    </tbody>
                </table>
            </div>

            <div class="d-flex justify-content-between align-items-center mt-3">
                <div id="pageInfo" class="text-secondary small">显示第 1 页，共 0 条记录</div>
                <nav>
                    <ul class="pagination pagination-sm mb-0" id="pagination"></ul>
                </nav>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="orderDetailModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content" style="border: none; border-radius: 12px; overflow: hidden;">
            <div class="modal-header bg-white" style="border-bottom: 2px solid #dc3545;">
                <h5 class="modal-title fw-bold" style="color: #dc3545;">
                    <i class="fa fa-file-invoice"></i> 订单详细信息
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body p-4">
                <div class="row g-3 mb-4 p-3 mx-0" style="background-color: #fff5f5; border-radius: 8px; border: 1px dashed #feb2b2;">
                    <div class="col-md-6">
                        <div class="mb-2">
                            <span class="text-muted small d-block">订单编号</span>
                            <span id="det_order_no" class="fw-bold text-dark"></span>
                        </div>
                        <div>
                            <span class="text-muted small d-block">下单时间</span>
                            <span id="det_create_time" class="text-dark"></span>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="mb-2 text-md-end">
                            <span class="text-muted small d-block">应付总额</span>
                            <span id="det_total_price" class="fs-4 fw-bold" style="color: #dc3545;"></span>
                        </div>
                        <div class="text-md-end">
                            <span class="text-muted small d-block">收货地址</span>
                            <span id="det_address" class="text-dark"></span>
                        </div>
                    </div>
                </div>

                <div class="d-flex align-items-center mb-3">
                    <div style="width: 4px; height: 18px; background: #dc3545; margin-right: 10px; border-radius: 2px;"></div>
                    <h6 class="mb-0 fw-bold">商品清单</h6>
                </div>

                <div class="table-responsive">
                    <table class="table table-borderless align-middle">
                        <thead style="border-bottom: 1px solid #eee;">
                        <tr class="text-muted small">
                            <th class="ps-0">内容描述</th>
                            <th class="text-center">单价</th>
                            <th class="text-center">数量</th>
                            <th class="text-end pe-0">金额</th>
                        </tr>
                        </thead>
                        <tbody id="det_items_body">
                        </tbody>
                    </table>
                </div>
            </div>

            <div class="modal-footer border-top-0">
                <button type="button" class="btn btn-sm btn-outline-secondary px-4" data-bs-dismiss="modal">关闭窗口</button>
            </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/order.js"></script>
