  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background-color: #f5f5f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding-bottom: 10vh;
      font-family: "SimSun", serif;
    }
    .container {
      background-color: white;
      width: 70%;
      height: 100vh;
      margin-top: 10vh;
      display: flex;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,0,0,0.05);
    }
    .footer {
      position: absolute;
      bottom: -20vh;
      left: 0;
      width: 100%;
      height: 10vh;
      line-height: 10vh;
      background-color: rgba(109, 89, 114, 0.19);
      text-align: center;
      font-size: 20px;
    }
    .left-container {
      width: 40%;
      position: relative;
    }
    .login-container {
      flex: 1;
      padding: 3%;
      padding-top: 5%;
    }
    #title {
      font-size: 1.5rem;
      color: #666;
    }
    .login-top {
      background-color: whitesmoke;
      border-radius: 10px;
      margin-top: 8%;
    }
    .top {
      font-size: 20px;
      display: flex;
      justify-content: space-around;
    }
    .top1, .top2 {
      margin: 10px;
      width: 100%;
      text-align: center;
      border-radius: 5px;
      cursor: pointer;
    }
    .top1:hover, .top2:hover {
      background-color: white;
    }
    .top1.active, .top2.active {
      color: #ab3cc7;
      font-weight: bold;
      border-bottom: 3px solid #6e5a73;
    }
    .login-form {
      margin: 20px;
      padding: 15px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .login-form div {
      margin-bottom: 15px;
      font-size: 15px;
      width: 100%;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px 0 0 12px;
    }
    .logo {
      display: flex;
      position: absolute;
      top: 20px;
      left: 20px;
      gap: 8px;
    }
    .logo img {
      width: 30px;
      height: 30px;
    }
    .logo span {
      font-size: 20px;
      color: white;
    }
    .center-title {
      position: absolute;
      top: 37%;
      left: 10%;
    }
    input,button{
      width: 100%;
    }
  </style>
</head>
<body>

<div class="container p-0 overflow-hidden">
  <div id="toastBox" class="alert alert-danger text-center d-none" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:9999; width:auto;" role="alert">
    请填写用户名和密码
  </div>
  <div class="left-container">
    <img src="../static/login.png" alt="登录页面图片"/>
    <div class="logo">
      <img src="../static/logo.png" alt="logo"/>
      <span>萌宠星球</span>
    </div>
    <div class="center-title">
      <span style="font-size: 30px;color: white">让陪伴<br/>更长久，更懂它。</span>
    </div>
  </div>

  <div class="login-container">
    <div style="text-align: center"><span id="title">你好！欢迎登录！</span></div>
    <div class="login-top">
      <div class="top">
        <div class="top1 active" id="loginTab" onclick="switchTab('login')">快速登录</div>
        <div style="font-size: 30px;">/</div>
        <div class="top2" id="registerTab" onclick="switchTab('register')">注册新号</div>
      </div>
    </div>

    <form class="login-form" id="loginForm">
      <div>
        <div><label for="username">用户名：</label></div>
        <div><input type="text" id="username" placeholder="请输入用户名" style="width: 100%"></div>
      </div>
      <div>
        <div><label for="password">密码：</label></div>
        <div><input type="password" id="password"  placeholder="请输入密码"></div>
      </div>
      <div>
        <button type="button"  style="background:#6e5a73; color:white"  onclick="login()">登&nbsp;&nbsp;录</button>
      </div>
    </form>
  </div>
</div>

<div class="footer">chongwuxingqiu@2021</div>
</body>
