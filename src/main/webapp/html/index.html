<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>宠物商城后台管理系统</title>
    <link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="../css/admin-layout.css"></head>
<body>
<div class="sidebar">
    <div class="sidebar-header">
        <i class="fas fa-paw"></i> <h4>宠物用品后台</h4>
    </div>
    <nav class="nav flex-column">
        <a class="nav-link menu-item active" href="#" data-page="dashboard.html">
            <i class="fas fa-home"></i> <span>控制面板</span>
        </a>
        <a class="nav-link menu-item" href="#" data-page="order.html">
            <i class="fa fa-shopping-cart"></i> <span>订单管理</span>
        </a>
        <a class="nav-link menu-item" href="#" data-page="good_list.html">
            <i class="fa fa-cubes"></i> <span>商品管理</span>
        </a>
        <a class="nav-link menu-item" href="#" data-page="category_list.html">
            <i class="fas fa-list"></i> <span>分类管理</span>
        </a>
        <a class="nav-link menu-item" href="#" data-page="user_list.html">
            <i class="fas fa-users-cog"></i> <span>用户管理</span>
        </a>
    </nav>
</div>
<header class="top-navbar d-flex align-items-center justify-content-between">
    <div class="d-flex align-items-center">
        <div class="toggle-btn me-3" id="sidebarCollapse">
            <i class="fas fa-bars"></i>
        </div>
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
                <li class="breadcrumb-item"><a href="#">首页</a></li>
                <li class="breadcrumb-item active" id="breadcrumb-current">控制面板</li>
            </ol>
        </nav>
    </div>

    <div class="d-flex align-items-center me-3">
        <div class="search-box me-4 d-none d-md-block">
            <div class="input-group input-group-sm">
                <input type="text" class="form-control" placeholder="搜索商品/订单...">
                <span class="input-group-text"><i class="fas fa-search"></i></span>
            </div>
        </div>

        <div class="dropdown">
            <div class="user-profile d-flex align-items-center dropdown-toggle"
                 id="userDropdown"
                 data-bs-toggle="dropdown"
                 aria-expanded="false"
                 style="cursor: pointer;">
                <img src="../static/images/avatar-default.png" class="rounded-circle me-2" width="32" height="32" alt="Avatar">
                <span class="admin-name d-none d-sm-inline">管理员</span>
            </div>

            <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userDropdown">
                <li>
                    <a class="dropdown-item" href="javascript:void(0);" onclick="switchPage('profile.html', '个人中心')">
                        <i class="fas fa-user-circle me-2"></i>个人中心
                    </a>
                </li>
                <li>
                    <a class="dropdown-item" href="javascript:void(0);" onclick="switchPage('password_edit.html', '修改密码')">
                        <i class="fas fa-key me-2"></i>修改密码
                    </a>
                </li>
                <li><hr class="dropdown-divider"></li>
                <li>
                    <a class="dropdown-item text-danger" href="javascript:logout();">
                        <i class="fas fa-sign-out-alt me-2"></i>退出登录
                    </a>
                </li>
            </ul>
        </div>
    </div>
</header>
<div class="main-content">
    <div id="main-container"></div>
</div>

<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

<script src="../js/index.js"></script>

</body>
</html>
